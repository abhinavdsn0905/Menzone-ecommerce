<div class="product-card">
    <div class="product-image">
        <img src="{{ product.image.url }}" alt="{{ product.name }}">
    </div>

    <div class="product-info">
        <h3>{{ product.name }}</h3>
        <p class="price">₹ {{ product.price }}</p>
        <a href="{% url 'add_to_cart' product.id %}" class="cart-btn">
            Add to Cart
        </a>
    </div>
</div>
